<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
<style>
body{margin:0;background:#000;color:white;font-family:Arial}
iframe{width:100%;height:60vh}
</style>
</head>

<body>

<button onclick="history.back()">⬅ Back</button>

<iframe id="player"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
  authDomain: "nipunadhamma-video.firebaseapp.com",
  databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nipunadhamma-video",
  storageBucket: "nipunadhamma-video.firebasestorage.app",
  messagingSenderId: "571055014816",
  appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id=new URLSearchParams(location.search).get("id");

get(child(ref(db),"videos/"+id)).then(snap=>{

let v=snap.val();

title.innerText=v.title;
desc.innerText=v.desc;

player.src="https://www.youtube.com/embed/"+getId(v.youtube);

});

function getId(url){
return url.includes("youtu.be")
? url.split("/").pop()
: url.split("v=")[1];
}

</script>

</body>
</html>
