    <title>මා දුටු භාවනා යෝගීහු
​පළමු වන පරිච්ඡේදය: ගල්ලෙනේ නිදාගත් වනගත අමුත්තා
​මෙම කෘතියෙහි අඩංගු වන්නේ මාගේ ජීවිත කාලය තුළ මා සැබැවින්ම දුටු, අසා දැනගත් සත්‍ය වූම තොරතුරු සහ සිදුවීම් සමුදායකි. මෙය එක්තරා නිශ්චිත පුද්ගලයෙකු වටා පමණක් ගෙතුණු කතාවක් නොවන බැවින්, මෙතැනින්ම ආරම්භ කළ යුතුය යන නිශ්චිත නියමයක් නැත. එබැවින් මාගේ මතකයට නැඟෙන සුවිශේෂී සත්‍ය පුවතකින්ම මෙම ලේඛනය ආරම්භ කිරීමට අදහස් කළෙමි. මෙහි එන කිසිදු පුවතක් ප්‍රබන්ධ හෝ මනඃකල්පිත නොවන බව පාඨකයා මුලින්ම වටහාගත යුතුය.
​අතීතයෙහි රත්නපුර ප්‍රදේශයේ පිහිටි එක්තරා වනගත ගල්ලෙනක, වස් කාලය ගත කිරීම සඳහා ස්වාමීන් වහන්සේ නමක් වැඩම කළහ. උන්වහන්සේ දැඩි ලෙස ප්‍රතිපත්ති පුරන, වනගතවම වාසය කරන යෝගාවචර භික්ෂුවක් වූහ. උන්වහන්සේගේ සාමාන්‍ය සිරිත වූයේ කිසිදු බාහිර පුද්ගලයෙකු සමඟ අනවශ්‍ය ලෙස වචනයක්වත් කථා නොකිරීමයි.
​උන්වහන්සේ මෙම ගල්ලෙනෙහි වස් සමාදන් වී වැඩසිටි දවසේ පටන්ම, සෑම දිනකම උදෑසන නවයට (9.00) පමණ සුවිශේෂී මිනිසෙක් එතැනට පැමිණියේය. ඔහු හැඳ සිටියේ කළු පැහැති මිටි අමුඩයක් පමණි. ගල්ලෙනට පැමිණෙන මෙම මිනිසා, එහි පැත්තකට වී කිසිදු ශබ්දයක් නොකර තද නින්දට වැටෙයි. පසුව සවස් වරුවේ දෙකට (2.00) පමණ අවදි වන ඔහු, පැමිණි මඟ ඔස්සේම නැවතත් වනය දෙසට ගමන් කරයි. වනගත භික්ෂුවක් වූ අප කථානායක ස්වාමීන් වහන්සේ ද තමන්ගේ ස්වභාවය අනුව මෙම අමුතු මිනිසා සමඟ කිසිදු වචනයක් කථා කරන්නට නොගියහ. උන්වහන්සේ ඔහු සමඟ කථා නොකිරීමට කිසියම් සුවිශේෂී හේතුවක් තිබෙන්නට ඇතත්, ලේඛකයා වන මා එය නිශ්චිතවම නොදනිමි.
​මෙලෙස සති, මාස ගෙවී ගිය අතර, මෙම මිනිසා මුළු වස් මාස තුන පුරාම කිසිදු දිනක් නෑර මෙලෙස ගල්ලෙනට පැමිණ නිදාගෙන ආපසු යන්නට විය. වස් කාලය අවසන් වූ දිනයේදී, ඔහු වෙනදා මෙන් නොව ඉතාමත් කුඩා ප්‍රමාණයේ පුස්කොළ පොතක් ද රැගෙන ආවේය. ඔහු එම කුඩා පුස්කොළ පොත ස්වාමීන් වහන්සේ වෙත පූජා කරමින්, "ස්වාමීනී, මේ පුස්කොළ පොත ඔබ වහන්සේට ගොඩක් වටිනවා," යැයි පැවසීය.
​ස්වාමීන් වහන්සේ එම පොත අතට ගෙන, එහි ලියැවී තිබූ අකුරු කියවා බැලූහ. එය විවිධ ලෞකික කටයුතු සඳහා භාවිත කරන මන්ත්‍ර ඇතුළත් පොතක් බව වටහාගත් උන්වහන්සේ, "මට මේ මන්තර පොත්වලින් කිසිදු වැඩක් නැහැ," යැයි පවසමින් එය නැවත ඔහුටම ලබා දුන්හ. එලෙස පොත ආපසු දුන්න ද, එම කෙටි වේලාවට පොත දෙස බැලූ සැනින් එහි තිබූ එක්තරා සුවිශේෂී මන්ත්‍රයක් උන්වහන්සේගේ මතකයේ රැඳුණු බව උන්වහන්සේ පසුව ප්‍රකාශ කර තිබේ.
​එම අවස්ථාවේදී, පුස්කොළ පොත ආපසු බාරගත් ඒ මිනිසා ස්වාමීන් වහන්සේ ඉදිරියේ අදහාගත නොහැකි පුදුමාකාර හෙළිදරව්වක් කළේය.
​"ස්වාමීනී, මම සාමාන්‍ය මනුෂ්‍යයෙක් නොවෙයි. මම මේ වනයේ වෙසෙන යක්ෂයෙක්. මේ මහා වනයේ වසන සෙසු යක්ෂයන් නිරන්තරයෙන්ම ඔවුනොවුන් පීඩා කරගනිමින්, ඉතාමත් කලහකාරී ලෙසයි හැසිරෙන්නේ. ඒ ඝෝෂාව සහ කලහය නිසා අපට වනය තුළ සුවසේ නිදාගන්නටවත් කිසිදු අවස්ථාවක් ලැබෙන්නේ නැහැ. මම දිනපතා ඔබ වහන්සේ වැඩසිටින මේ ගල්ලෙනට පැමිණියේ සුව නින්දක් ලැබීමේ අදහසින්. ඔබ වහන්සේ මෙහි සිට පතුරුවන ලද ඒ මහා මෙත් සිතේ (මෛත්‍රී බලයේ) ශාන්තිය නිසා, මට කිසිදු බියක් හෝ පීඩාවක් නැතිව මේ ගල්ලෙන තුළ ඉතාමත් සුවසේ නිදාගන්නට අවස්ථාව ලැබුණා. ඒ වෙනුවෙන් ඔබ වහන්සේට ගොඩක් පින් සිද්ධ වෙනවා."
​මෙලෙස තමන් පිළිබඳ සත්‍යය ප්‍රකාශ කළ ඒ අමනුෂ්‍යයා, ස්වාමීන් වහන්සේගේ පාද ද්විත්වය වැඳ නමස්කාර කොට, ක්ෂණයකින් නැවත වනය තුළටම නික්ම ගියේය.
​තමන් වහන්සේගේ මෙත් සිත නිසා සිදු වූ මෙම විස්මිත සිදුවීමෙන් අනතුරුව, වස් කාලය නිමා වූ බැවින් අප කථානායක භික්ෂූන් වහන්සේ ද එම ගල්ලෙනෙන් නික්ම, වනය මැදින්ම තවත් ඈත පිහිටි අප්‍රකට ගල්ලෙනක් සොයාගෙන ඉදිරියටම වැඩම කළහ.</title>
