
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>

/* =========================
   🌿 BUDDHIST NAVBAR THEME
========================= */

:root {
    --parchment: #e3c79a;
    --dark-text: #2c1e0f;
    --gold: #c5b358;
}

/* BODY */
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    padding-top:70px;
}

/* NAVBAR */
.navbar{
    background:var(--parchment);
    height:70px;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:fixed;
    top:0;
    width:100%;
    box-sizing:border-box;
    z-index:1000;
    border-bottom:2px solid var(--gold);
}

.logo-section{
    display:flex;
    align-items:center;
}

.nav-logo{
    height:45px;
    margin-right:10px;
}

.logo-section span{
    font-weight:bold;
    font-size:18px;
    color:#3b2a1a;
}

/* MENU */
.menu-toggle{
    display:none;
    font-size:28px;
    margin-left:auto;
    cursor:pointer;
    color:#3b2a1a;
}

.nav-links{
    display:flex;
    margin-left:auto;
    gap:10px;
}

.nav-item{
    position:relative;
    padding:10px;
    font-weight:bold;
    cursor:pointer;
    color:#3b2a1a;
}

/* DROPDOWN */
.dropdown{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:white;
    min-width:180px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.nav-item:hover .dropdown{
    display:block;
}

.dropdown a{
    display:block;
    padding:10px;
    text-decoration:none;
    color:#333;
}

.dropdown a:hover{
    background:#eee;
}

/* MOBILE NAV */
@media(max-width:900px){

.menu-toggle{display:block;}

.nav-links{
    display:none;
    flex-direction:column;
    position:absolute;
    top:70px;
    left:0;
    width:100%;
    background:#2b2520;
}

.nav-links.active{
    display:flex;
}

.nav-item{
    color:white;
}

.dropdown{
    position:static;
    background:#3a3128;
}
}
/* MAIN LAYOUT */
.container{
    display:flex;
    gap:10px;
    padding:10px;
    flex-wrap:wrap;
}

/* PLAYER */
.player-area{
    flex:2;
    min-width:300px;
}

.player{
    width:100%;
    height:50vh;
    border:none;
    background:black;
}

/* QUEUE */
.queue{
    flex:1;
    background:#181818;
    border-radius:10px;
    padding:10px;
    height:50vh;
    overflow-y:auto;
}

.queue-item{
    padding:8px;
    margin-bottom:5px;
    background:#222;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

/* MONK SECTION */
.monk-section{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
    padding:10px;
}

.monk-btn{
    background:#333;
    padding:15px;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}

.monk-btn:hover{
    background:#555;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:#1f1f1f;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:110px;
    object-fit:cover;
}

.card p{
    padding:8px;
    font-size:13px;
}

/* ========================= */
/* ✅ MOBILE FIX (IMPORTANT) */
/* ========================= */
@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .player-area{
        order:1;
    }

    .queue{
        order:2;
        height:auto;
        max-height:250px;
    }
}
</style>
</head>

<body>


<!-- ================= NAVBAR ================= -->
<div class="navbar">

    <div class="logo-section">
        <img src="https://i.postimg.cc/Vvq8M0k2/logo1.png" class="nav-logo">
        <span>nipunadhamma.org</span>
    </div>

    <div class="menu-toggle" id="menuToggle">☰</div>

    <div class="nav-links" id="navLinks">

        <div class="nav-item">ආලින්දය</div>

        <div class="nav-item">ධම්ම වාහිණී
            <div class="dropdown">
                <a href="video.html">ධර්ම සාකච්ඡා</a>
                <a href="player.html">ධර්ම දේශනා</a>
            </div>
        </div>

        <div class="nav-item">පොත්ගුල
            <div class="dropdown">
                <a href="dhamma-books.html">දහම් පොත්</a>
                <a href="blog.html">සඟරාව</a>
            </div>
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container">

    <div class="player-area">
        <iframe id="player" class="player"></iframe>
        <div id="title" style="padding:10px;">Loading...</div>
    </div>

    <div class="queue">
        <h3>▶ Up Next</h3>
        <div id="queueList"></div>
    </div>

</div>

<!-- MONK BUTTONS -->
<div class="monk-section">
    <button class="monk-btn" onclick="playMonkVideo('wJPZmk1Xoxs','දොළොස්වල උදිතදීර ස්වාමීන් වහන්සේ')">දොළොස්වල උදිතදීර හිමියන්</button>
    <button class="monk-btn" onclick="playMonkVideo('D6ONzhpvbD4','කලවානේ සංගාමජි හිමියන්')">කලවානේ සංගාමජි හිමියන්</button>
    <button class="monk-btn" onclick="playMonkVideo('VIDEO_ID_3','මීපාගම සංඝරතන හිමියන්')">මීපාගම හිමියන්</button>
</div>

<div class="grid" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
    authDomain: "nipunadhamma-video.firebaseapp.com",
    databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nipunadhamma-video",
    storageBucket: "nipunadhamma-video.firebasestorage.app",
    appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videos = [];

/* MONK VIDEO */
window.playMonkVideo = function(id,name){
    document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1`;

    document.getElementById("title").innerText = name;

    window.scrollTo({top:0,behavior:"smooth"});
};

/* LOAD FIREBASE */
onValue(ref(db,"videos"),(snap)=>{
    videos = [];
    snap.forEach(v=>videos.push({id:v.key,...v.val()}));

    videos.reverse();

    if(videos.length>0) playVideo(videos[0]);

    renderGrid();
});

/* PLAY */
function playVideo(v){
    const id = getId(v.youtube);

    document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

    document.getElementById("title").innerText = v.title;

    renderQueue(v.playlist || "All");
}

/* QUEUE */
function renderQueue(type){
    let list = videos.filter(v=>type==="All"?true:v.playlist===type);

    document.getElementById("queueList").innerHTML =
    list.map(v=>`<div class="queue-item" onclick="playFromQueue('${v.id}')">▶ ${v.title}</div>`).join('');
}

/* GRID */
function renderGrid(){
    document.getElementById("grid").innerHTML =
    videos.map(v=>{
        const id=getId(v.youtube);
        return `
        <div class="card" onclick="playFromGrid('${v.id}')">
            <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
            <p>${v.title}</p>
        </div>`;
    }).join('');
}

window.playFromGrid = (id)=>playVideo(videos.find(v=>v.id===id));
window.playFromQueue = (id)=>playVideo(videos.find(v=>v.id===id));

function getId(url){
    let m = url?.match(/(youtu\.be\/|v=|\/embed\/)([a-zA-Z0-9_-]+)/);
    return m?m[2]:"";
}
</script>

</body>
</html>
