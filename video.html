<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

.nav{
padding:15px;
background:#111827;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
}

.hero{
height:60vh;
background:black;
position:relative;
display:flex;
align-items:flex-end;
padding:20px;
}

.hero iframe{
position:absolute;
width:100%;
height:100%;
opacity:0.6;
border:none;
}

.hero h1{
z-index:2;
}

.row{
padding:20px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:200px;
background:#1f2937;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card p{
padding:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="nav">🎬 Nipunadhamma TV</div>

<div class="hero">
<iframe id="hero"></iframe>
<h1 id="title">Loading...</h1>
</div>

<div id="content"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
  authDomain: "nipunadhamma-video.firebaseapp.com",
  databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nipunadhamma-video",
  storageBucket: "nipunadhamma-video.firebasestorage.app",
  messagingSenderId: "571055014816",
  appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videos = [];

onValue(ref(db,"videos"),(snap)=>{

videos = [];

snap.forEach(v=>{
videos.push({...v.val(), id:v.key});
});

videos.reverse();

if(videos.length>0){
setHero(videos[0]);
}

render();

});

function setHero(v){

const id = getId(v.youtube);

document.getElementById("hero").src =
`https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

document.getElementById("title").innerText = v.title;

/* VIEW COUNT */
update(ref(db,"videos/"+v.id),{
views:(v.views||0)+1
});

}

function render(){

let html = `<div class="row"><h2>🔥 Trending</h2><div class="row-posters">`;

videos = videos.sort((a,b)=>(b.views||0)-(a.views||0));

videos.forEach(v=>{

const id = getId(v.youtube);

html += `
<div class="card" onclick='setHeroGlobal(${JSON.stringify(v)})'>
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<p>${v.title}</p>
</div>
`;

});

html += `</div></div>`;

document.getElementById("content").innerHTML = html;

}

window.setHeroGlobal = function(v){
setHero(v);
}

function getId(url){
if(!url) return "";
if(url.includes("youtu.be/")) return url.split("/").pop();
return url.split("v=")[1].split("&")[0];
}

</script>

</body>
</html>
