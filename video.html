<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAV */
.nav{
padding:10px 15px;
background:#111;
font-weight:bold;
color:#ff0000;
position:sticky;
top:0;
}

/* LAYOUT */
.container{
display:flex;
gap:10px;
padding:10px;
}

/* PLAYER */
.player-area{
flex:2;
}

.player{
width:100%;
height:60vh;
border:none;
background:black;
}

.title{
padding:10px;
font-size:18px;
}

/* QUEUE */
.queue{
flex:1;
background:#181818;
border-radius:10px;
padding:10px;
height:70vh;
overflow-y:auto;
}

.queue-item{
padding:8px;
margin-bottom:5px;
background:#222;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.queue-item:hover{
background:#333;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.card p{
padding:8px;
font-size:13px;
}

/* MOBILE */
@media(max-width:768px){
.container{flex-direction:column;}
.player{height:35vh;}
.queue{height:auto;}
}

</style>
</head>

<body>

<div class="nav">▶ Nipunadhamma TV</div>

<div class="container">

<!-- PLAYER -->
<div class="player-area">
<iframe id="player" class="player"></iframe>
<div class="title" id="title">Loading...</div>
</div>

<!-- QUEUE -->
<div class="queue">
<h3>▶ Up Next</h3>
<div id="queueList"></div>
</div>

</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
authDomain: "nipunadhamma-video.firebaseapp.com",
databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "nipunadhamma-video",
storageBucket: "nipunadhamma-video.firebasestorage.app",
appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videos = [];
let currentVideo = null;

/* LOAD */
onValue(ref(db,"videos"),(snap)=>{

videos = [];

snap.forEach(v=>{
videos.push({id:v.key, ...v.val()});
});

videos.reverse();

if(videos.length>0){
playVideo(videos[0]);
}

renderGrid();

});

/* PLAY VIDEO */
function playVideo(v){

currentVideo = v;

const id = getId(v.youtube);

if(!id) return;

const player = document.getElementById("player");
player.src = "";

setTimeout(()=>{
player.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;
},100);

document.getElementById("title").innerText = v.title || "Untitled";

/* views safe */
update(ref(db,"videos/"+v.id),{
views:(v.views||0)+1
});

/* queue */
renderQueue(v.playlist || "All");

}

/* QUEUE */
function renderQueue(playlist){

let list = videos.filter(v=>
(playlist==="All") ? true : v.playlist===playlist
);

let html = "";

list.forEach(v=>{
html += `
<div class="queue-item" onclick="window.playFromQueue('${v.id}')">
▶ ${v.title || "No title"}
</div>
`;
});

document.getElementById("queueList").innerHTML = html;
}

/* GRID */
function renderGrid(){

videos = videos.sort((a,b)=>(b.views||0)-(a.views||0));

let html="";

videos.forEach(v=>{

const id = getId(v.youtube);

html += `
<div class="card" onclick="window.playFromGrid('${v.id}')">
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<p>${v.title || ""}</p>
</div>
`;

});

document.getElementById("grid").innerHTML = html;

}

/* GLOBAL PLAY FUNCTIONS */
window.playFromGrid = function(id){
const v = videos.find(x=>x.id===id);
if(v) playVideo(v);
}

window.playFromQueue = function(id){
const v = videos.find(x=>x.id===id);
if(v) playVideo(v);
}

/* YT ID SAFE */
function getId(url){

if(!url) return "";

let m = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
if(m) return m[1];

m = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
if(m) return m[1];

m = url.match(/embed\/([a-zA-Z0-9_-]+)/);
if(m) return m[1];

return "";
}

</script>

</body>
</html>
