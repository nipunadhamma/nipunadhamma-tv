<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:#111;
position:sticky;
top:0;
z-index:100;
}

.logo{
color:#ff0000;
font-weight:bold;
font-size:18px;
}

/* MAIN LAYOUT */
.container{
display:flex;
gap:10px;
padding:10px;
}

/* PLAYER AREA */
.player-area{
flex:2;
}

.player{
width:100%;
height:60vh;
border:none;
background:black;
}

.title{
padding:10px;
font-size:18px;
}

/* QUEUE SIDE PANEL */
.queue{
flex:1;
background:#181818;
border-radius:10px;
padding:10px;
height:70vh;
overflow-y:auto;
}

.queue h3{
margin-top:0;
}

.queue-item{
padding:8px;
margin-bottom:5px;
background:#222;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.queue-item:hover{
background:#333;
}

/* GRID (HOME STYLE) */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.card p{
padding:8px;
font-size:13px;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

.container{
flex-direction:column;
}

.player{
height:35vh;
}

.queue{
height:auto;
order:2;
}

}

</style>
</head>

<body>

<div class="nav">
<div class="logo">▶ Nipunadhamma TV</div>
</div>

<!-- PLAYER + QUEUE -->
<div class="container">

<div class="player-area">
<iframe id="player" class="player"></iframe>
<div class="title" id="title">Loading...</div>
</div>

<div class="queue">
<h3>▶ Up Next</h3>
<div id="queueList"></div>
</div>

</div>

<!-- HOME GRID -->
<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
  authDomain: "nipunadhamma-video.firebaseapp.com",
  databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nipunadhamma-video",
  storageBucket: "nipunadhamma-video.firebasestorage.app",
  messagingSenderId: "571055014816",
  appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videos = [];

/* LOAD */
onValue(ref(db,"videos"),(snap)=>{

videos = [];

snap.forEach(v=>{
videos.push({...v.val(), id:v.key});
});

videos.reverse();

if(videos.length){
playVideo(videos[0]);
}

renderGrid();

});

/* PLAY VIDEO */
function playVideo(v){

const id = getId(v.youtube);

document.getElementById("player").src =
`https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

document.getElementById("title").innerText = v.title;

/* views */
update(ref(db,"videos/"+v.id),{
views:(v.views||0)+1
});

/* queue */
renderQueue(v.playlist);
}

/* QUEUE (YouTube style) */
function renderQueue(playlist){

let list = videos.filter(v=>v.playlist===playlist);

let html = "";

list.forEach(v=>{

html += `
<div class="queue-item" onclick='playVideoGlobal(${JSON.stringify(v)})'>
▶ ${v.title}
</div>
`;

});

document.getElementById("queueList").innerHTML = html;

}

/* GRID */
function renderGrid(){

let html="";

videos = videos.sort((a,b)=>(b.views||0)-(a.views||0));

videos.forEach(v=>{

const id = getId(v.youtube);

html += `
<div class="card" onclick='playVideoGlobal(${JSON.stringify(v)})'>
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<p>${v.title}</p>
</div>
`;

});

document.getElementById("grid").innerHTML = html;

}

window.playVideoGlobal = function(v){
playVideo(v);
}

/* YOUTUBE ID */
function getId(url){
if(!url) return "";
if(url.includes("youtu.be/")){
return url.split("/").pop();
}
if(url.includes("watch?v=")){
return url.split("v=")[1].split("&")[0];
}
return "";
}

</script>

</body>
</html>
