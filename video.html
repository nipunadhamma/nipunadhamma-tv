<style>
  /* ===== FORCE TOP FIX ===== */

body{
margin:0 !important;
padding:0 !important;
overflow-x:hidden !important;
}

html{
margin:0 !important;
padding:0 !important;
}

#content,
.content,
.content-outer,
.main-outer,
.main-inner,
.columns,
.post,
.post-body,
.post-outer,
.post-outer-container,
.main-wrapper,
.region-inner{

margin-top:-50 !important;
padding-top:-50 !important;

}

/* ===== MOVE PLAYER UP ===== */

.container{

margin-top:-250px !important;
padding-top:10 !important;

}
/* ===== REMOVE ONLY TOP WHITE AREA ===== */

.header-outer,
.header-inner,
.header-wrapper,
.Header,
#header,
#Header1,
.widget.Header,
.blog-feeds,
.feed-links{

display:none !important;

}

/* ===== REMOVE BLOGGER WHITE SPACE ===== */

body,
html,
.content-outer,
.content-fauxcolumn-outer,
.region-inner,
.main-outer,
.main-inner,
.columns,
.content-wrapper{

margin:0 !important;
padding:0 !important;
max-width:100% !important;
width:100% !important;
background:#070b14 !important;

}

/* ===== KEEP PAGE CONTENT ===== */

.post-outer-container,
.post-outer,
.post,
.post-body{

margin:0 auto !important;
padding:0 !important;
width:100% !important;
max-width:100% !important;
background:#070b14 !important;

}

/* ===== PLAYER TOP ===== */

.container{

margin-top:0 !important;
padding-top:0 !important;

}
/* ===== BLOGGER WHITE SPACE REMOVE ===== */

html,
body,
body#layout,
.content-outer,
.content-fauxcolumn-outer,
.region-inner,
.main-outer,
.main-inner,
.columns,
.content-wrapper,
.post-outer-container,
.post-outer,
.post,
.post-body,
.section,
.widget,
.widget-content {

margin:0 !important;
padding:0 !important;
width:100% !important;
max-width:100% !important;
overflow-x:hidden !important;
box-sizing:border-box !important;

}

/* ===== HIDE BLOGGER EXTRA WHITE AREA ===== */

body{
background:#070b14 !important;
font-family:Arial,sans-serif;
color:white;
}

/* ===== MAIN CONTAINER ===== */

.container{
width:100%;
max-width:100%;
margin:0;
padding:8px;
}

/* ===== TITLE ===== */

.top-title{
font-size:34px;
font-weight:bold;
margin:8px 0 20px;
text-align:center;
}

/* ===== PLAYER LAYOUT ===== */

.player-layout{
display:grid;
grid-template-columns:2.2fr 1fr;
gap:15px;
align-items:start;
}

/* ===== PLAYER SIDE ===== */

.player-side{
width:100%;
}

/* ===== PLAYER ===== */

.player-box{
width:100%;
aspect-ratio:16/9;
background:black;
border-radius:10px;
overflow:hidden;
}

.player-box iframe{
width:100%;
height:100%;
border:none;
}

/* ===== VIDEO DETAILS ===== */

.main-title{
font-size:28px;
font-weight:bold;
margin-top:15px;
line-height:1.5;
}

.main-speaker{
font-size:15px;
margin-top:10px;
color:#cbd5e1;
}

.main-desc{
font-size:14px;
margin-top:10px;
line-height:1.7;
color:#94a3b8;
}

/* ===== SIDE PANEL ===== */

.side-panel{
background:#111827;
border-radius:12px;
padding:12px;
height:100%;
}

.side-title-head{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.side-videos{
display:flex;
flex-direction:column;
gap:12px;
max-height:720px;
overflow-y:auto;
}

/* ===== SIDE VIDEO ===== */

.side-video{
display:flex;
gap:10px;
background:#1e293b;
padding:8px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.side-video:hover{
background:#334155;
}

.side-thumb{
width:140px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.side-content{
flex:1;
}

.side-video-title{
font-size:13px;
font-weight:bold;
line-height:1.4;
margin-bottom:5px;
}

.side-video-speaker{
font-size:11px;
color:#94a3b8;
}

/* ===== SECTION TITLE ===== */

.section-title{
font-size:28px;
font-weight:bold;
margin:35px 0 20px;
}

/* ===== VIDEO GRID ===== */

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px;
}

/* ===== VIDEO CARD ===== */

.video-card{
background:#111827;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.video-card:hover{
transform:scale(1.03);
}

.video-thumb{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
}

.video-content{
padding:12px;
}

.video-title{
font-size:15px;
font-weight:bold;
line-height:1.4;
margin-bottom:8px;
}

.video-desc{
font-size:12px;
line-height:1.5;
color:#94a3b8;
height:40px;
overflow:hidden;
}

/* ===== PLAYLIST AREA ===== */

.playlist-sections{
display:flex;
flex-direction:column;
gap:40px;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

.player-layout{
grid-template-columns:1fr;
}

.top-title{
font-size:26px;
}

.main-title{
font-size:22px;
}

.video-grid{
grid-template-columns:1fr 1fr;
gap:12px;
}

.side-thumb{
width:110px;
height:65px;
}

.container{
padding:5px;
}

}

</style>

<div class="container">

<div class="top-title">
🎬 Nipunadhamma TV
</div>

<div class="player-layout">

<div class="player-side">

<div class="player-box">

<iframe allowfullscreen="" id="mainPlayer">
</iframe>

</div>

<div class="main-title" id="mainTitle">
Loading...
</div>

<div class="main-speaker" id="mainSpeaker">
Loading...
</div>

<div class="main-desc" id="mainDesc">
Loading...
</div>

</div>

<div class="side-panel">

<div class="side-title-head" id="sideHead">
📂 ඊළඟට නරඹන්න...
</div>

<div class="side-videos" id="sideVideos">
</div>

</div>

</div>

<div class="section-title">
🔥 නවතම දේශනා
</div>

<div class="video-grid" id="latestVideos">
</div>

<div class="playlist-sections" id="playlistSections">
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",

authDomain: "nipunadhamma-video.firebaseapp.com",

databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "nipunadhamma-video",

storageBucket: "nipunadhamma-video.firebasestorage.app",

messagingSenderId: "571055014816",

appId: "1:571055014816:web:301e15593a7ab7dd591ac5"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const player =
document.getElementById("mainPlayer");

const titleBox =
document.getElementById("mainTitle");

const speakerBox =
document.getElementById("mainSpeaker");

const descBox =
document.getElementById("mainDesc");

const sideVideos =
document.getElementById("sideVideos");

const latestVideos =
document.getElementById("latestVideos");

const playlistSections =
document.getElementById("playlistSections");

const sideHead =
document.getElementById("sideHead");

let videos = [];

function getVideoId(url){

try{

if(url.includes("watch?v=")){

return url.split("watch?v=")[1].split("&")[0];

}

if(url.includes("youtu.be/")){

return url.split("youtu.be/")[1].split("?")[0];

}

return "";

}catch(e){

return "";

}

}

window.playVideo = function(index){

const data = videos[index];

const videoId =
getVideoId(data.youtube);

player.src =
`https://www.youtube.com/embed/${videoId}?autoplay=1`;

titleBox.innerText =
data.title || "";

speakerBox.innerText =
"🎙 " + (data.speaker || "");

descBox.innerText =
data.description || "";

const currentPlaylist =
data.playlist || "Related Videos";

sideHead.innerText =
"📂 " + currentPlaylist;

renderSideVideos(currentPlaylist,index);

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function renderSideVideos(playlist,currentIndex){

sideVideos.innerHTML="";

videos.forEach((data,index)=>{

if(index===currentIndex) return;

if((data.playlist||"")!==playlist) return;

const videoId =
getVideoId(data.youtube);

const thumb =
`https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

sideVideos.innerHTML += `

<div
class="side-video"
onclick="playVideo(${index})">

<img
src="${thumb}"
class="side-thumb">

<div class="side-content">

<div class="side-video-title">
${data.title}
</div>

<div class="side-video-speaker">
${data.speaker || ""}
</div>

</div>

</div>

`;

});

}

function createVideoCard(data,index){

const videoId =
getVideoId(data.youtube);

const thumb =
`https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

return `

<div
class="video-card"
onclick="playVideo(${index})">

<img
src="${thumb}"
class="video-thumb">

<div class="video-content">

<div class="video-title">
${data.title}
</div>

<div class="video-desc">
${data.description || ""}
</div>

</div>

</div>

`;

}

onValue(ref(db,"videos"),(snapshot)=>{

videos=[];

snapshot.forEach((child)=>{

videos.push(child.val());

});

videos.reverse();

latestVideos.innerHTML="";
playlistSections.innerHTML="";

if(videos.length>0){

playVideo(0);

}

videos.slice(0,8).forEach((data,index)=>{

latestVideos.innerHTML +=
createVideoCard(data,index);

});

const playlists = {};

videos.forEach((video,index)=>{

const playlist =
video.playlist || "Other";

if(!playlists[playlist]){

playlists[playlist]=[];

}

playlists[playlist].push({
...video,
realIndex:index
});

});

Object.keys(playlists).forEach((playlist)=>{

playlistSections.innerHTML += `

<div>

<div class="section-title">
📂 ${playlist}
</div>

<div class="video-grid">

${playlists[playlist].map(v=>
createVideoCard(v,v.realIndex)
).join("")}

</div>

</div>

`;

});

});

</script>
