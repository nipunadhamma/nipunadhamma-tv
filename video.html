<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#0b0f19;
color:white;
font-family:Arial;
overflow-x:hidden;
}

/* NAVBAR */
.nav{
padding:15px 25px;
font-size:22px;
font-weight:bold;
color:#e50914;
}

/* HERO */
.hero{
width:100%;
height:60vh;
position:relative;
display:flex;
align-items:flex-end;
padding:30px;
background:#000;
}

.hero iframe{
position:absolute;
top:0;left:0;
width:100%;height:100%;
opacity:0.6;
}

.hero-content{
position:relative;
z-index:2;
}

.hero-title{
font-size:32px;
font-weight:bold;
}

.hero-desc{
color:#bbb;
margin-top:10px;
max-width:500px;
}

/* ROW */
.row{
margin-top:30px;
padding:0 20px;
}

.row h2{
margin-bottom:10px;
font-size:20px;
}

.row-posters{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:10px;
}

.row-posters::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
min-width:220px;
background:#141a2a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.08);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card p{
padding:10px;
font-size:13px;
}

</style>
</head>

<body>

<div class="nav">🎬 Nipunadhamma TV</div>

<!-- HERO -->
<div class="hero">
<iframe id="heroPlayer"></iframe>

<div class="hero-content">
<div class="hero-title" id="heroTitle">Loading...</div>
<div class="hero-desc" id="heroDesc"></div>
</div>
</div>

<!-- ROWS -->
<div id="rows"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
authDomain: "nipunadhamma-video.firebaseapp.com",
databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "nipunadhamma-video",
storageBucket: "nipunadhamma-video.firebasestorage.app",
messagingSenderId: "571055014816",
appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videos = [];

/* GET ID */
function getId(url){
if(!url) return "";
if(url.includes("youtu.be/")){
return url.split("youtu.be/")[1].split("?")[0];
}
if(url.includes("watch?v=")){
return url.split("watch?v=")[1].split("&")[0];
}
return "";
}

/* HERO */
function setHero(video){
const id = getId(video.youtube);

document.getElementById("heroPlayer").src =
`https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

document.getElementById("heroTitle").innerText = video.title;
document.getElementById("heroDesc").innerText = video.description;
}

/* GROUP BY PLAYLIST */
function groupByPlaylist(videos){
const groups = {};
videos.forEach(v=>{
const p = v.playlist || "Others";
if(!groups[p]) groups[p]=[];
groups[p].push(v);
});
return groups;
}

/* RENDER */
onValue(ref(db,"videos"),(snap)=>{
videos = [];
snap.forEach(c=>videos.push(c.val()));
videos.reverse();

if(videos.length>0){
setHero(videos[0]);
}

const rows = document.getElementById("rows");
rows.innerHTML = "";

const groups = groupByPlaylist(videos);

Object.keys(groups).forEach(name=>{
rows.innerHTML += `
<div class="row">
<h2>${name}</h2>
<div class="row-posters">
${groups[name].map(v=>{
const id = getId(v.youtube);
return `
<div class="card" onclick='setHero(${JSON.stringify(v)})'>
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<p>${v.title}</p>
</div>
`;
}).join("")}
</div>
</div>
`;
});

});

window.setHero = setHero;

</script>

</body>
</html>
