<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
overflow-x:hidden;
background:#070b14;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:100%;
padding:10px;
}

.top-title{
font-size:34px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.player-layout{
display:grid;
grid-template-columns:2.2fr 1fr;
gap:15px;
}

.player-box{
width:100%;
aspect-ratio:16/9;
background:black;
border-radius:12px;
overflow:hidden;
}

.player-box iframe{
width:100%;
height:100%;
border:none;
}

.main-title{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.main-speaker{
font-size:15px;
color:#cbd5e1;
margin-top:8px;
}

.main-desc{
font-size:14px;
color:#94a3b8;
margin-top:8px;
}

.side-panel{
background:#111827;
padding:12px;
border-radius:12px;
}

.side-title-head{
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

.side-videos{
display:flex;
flex-direction:column;
gap:10px;
}

.side-video{
display:flex;
gap:10px;
background:#1e293b;
padding:8px;
border-radius:10px;
cursor:pointer;
}

.side-thumb{
width:120px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.video-card{
background:#111827;
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

.video-thumb{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}

.video-content{
padding:10px;
}

.video-title{
font-size:14px;
font-weight:bold;
}

.video-desc{
font-size:12px;
color:#94a3b8;
}

@media(max-width:900px){
.player-layout{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<div class="top-title">🎬 Nipunadhamma TV</div>

<div class="player-layout">

<div>
<div class="player-box">
<iframe id="mainPlayer"></iframe>
</div>

<div class="main-title" id="mainTitle">Loading...</div>
<div class="main-speaker" id="mainSpeaker"></div>
<div class="main-desc" id="mainDesc"></div>
</div>

<div class="side-panel">
<div class="side-title-head" id="sideHead">📂 Videos</div>
<div class="side-videos" id="sideVideos"></div>
</div>

</div>

<div class="video-grid" id="latestVideos"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
authDomain: "nipunadhamma-video.firebaseapp.com",
databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "nipunadhamma-video",
storageBucket: "nipunadhamma-video.firebasestorage.app",
messagingSenderId: "571055014816",
appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ELEMENTS */
const player = document.getElementById("mainPlayer");
const titleBox = document.getElementById("mainTitle");
const speakerBox = document.getElementById("mainSpeaker");
const descBox = document.getElementById("mainDesc");
const sideVideos = document.getElementById("sideVideos");
const latestVideos = document.getElementById("latestVideos");
const sideHead = document.getElementById("sideHead");

let videos = [];

/* GET ID */
function getVideoId(url){
if(!url) return "";
if(url.includes("watch?v=")){
return url.split("watch?v=")[1].split("&")[0];
}
if(url.includes("youtu.be/")){
return url.split("youtu.be/")[1].split("?")[0];
}
return "";
}

/* PLAY */
window.playVideo = function(index){
const v = videos[index];
const id = getVideoId(v.youtube);

player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;

titleBox.innerText = v.title;
speakerBox.innerText = v.speaker;
descBox.innerText = v.description;

renderSide(index);
}

/* SIDE */
function renderSide(current){
sideVideos.innerHTML = "";

videos.forEach((v,i)=>{
if(i === current) return;

const id = getVideoId(v.youtube);
const thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

sideVideos.innerHTML += `
<div class="side-video" onclick="playVideo(${i})">
<img src="${thumb}" class="side-thumb">
<div>
<div>${v.title}</div>
<div style="font-size:11px;color:#94a3b8">${v.speaker}</div>
</div>
</div>`;
});
}

/* LOAD DATA */
onValue(ref(db,"videos"),(snap)=>{
videos = [];

snap.forEach(child=>{
videos.push(child.val());
});

videos.reverse();

/* first video play */
if(videos.length > 0){
playVideo(0);
}

/* latest grid */
latestVideos.innerHTML = "";
videos.slice(0,8).forEach((v,i)=>{
latestVideos.innerHTML += `
<div class="video-card" onclick="playVideo(${i})">
<img class="video-thumb" src="https://img.youtube.com/vi/${getVideoId(v.youtube)}/hqdefault.jpg">
<div class="video-content">
<div class="video-title">${v.title}</div>
<div class="video-desc">${v.description}</div>
</div>
</div>`;
});

});

</script>

</body>
</html>
