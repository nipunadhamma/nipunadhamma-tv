<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipunadhamma TV</title>

<style>

:root{
    --parchment:#e3c79a;
    --gold:#c5b358;
}

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    padding-top:70px;
}

/* NAV */
.navbar{
    background:var(--parchment);
    height:70px;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:fixed;
    top:0;
    width:100%;
    box-sizing:border-box;
    z-index:1000;
    border-bottom:2px solid var(--gold);
}

.logo-section{
    display:flex;
    align-items:center;
}

.nav-logo{
    height:45px;
    margin-right:10px;
}

.logo-section span{
    font-weight:bold;
    color:#3b2a1a;
}

/* LAYOUT */
.container{
    display:flex;
    gap:10px;
    padding:10px;
    flex-wrap:wrap;
}

.player-area{
    flex:2;
    min-width:300px;
}

.player{
    width:100%;
    height:50vh;
    border:none;
    background:black;
}

/* QUEUE */
.queue{
    flex:1;
    background:#181818;
    border-radius:10px;
    padding:10px;
    height:50vh;
    overflow-y:auto;
}

.queue-item{
    padding:8px;
    margin-bottom:5px;
    background:#222;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:#1f1f1f;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:110px;
    object-fit:cover;
}

.card p{
    padding:8px;
    font-size:13px;
}

/* MOBILE FIX */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .queue{
        order:2;
        height:auto;
        max-height:250px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div class="logo-section">
        <img src="https://i.postimg.cc/Vvq8M0k2/logo1.png" class="nav-logo">
        <span>nipunadhamma.org</span>
    </div>
</div>

<!-- PLAYER + QUEUE -->
<div class="container">

    <div class="player-area">
        <iframe id="player" class="player"></iframe>
        <div id="title" style="padding:10px;">Loading...</div>
    </div>

    <div class="queue">
        <h3>▶ Up Next</h3>
        <div id="queueList"></div>
    </div>

</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
    authDomain: "nipunadhamma-video.firebaseapp.com",
    databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nipunadhamma-video",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videos = [];

/* LOAD DATA */
onValue(ref(db,"videos"),(snap)=>{
    videos = [];

    snap.forEach(v=>{
        videos.push({id:v.key,...v.val()});
    });

    videos.reverse();

    if(videos.length>0){
        playVideo(videos[0]);
    }

    renderQueue("All");
    renderGrid();
});

/* PLAY VIDEO */
function playVideo(v){

    const id = getId(v.youtube);

    document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1`;

    document.getElementById("title").innerText = v.title || "Untitled";
}

/* QUEUE FIX */
function renderQueue(type){

    let list = videos.filter(v=>{
        return type==="All" ? true : v.playlist===type;
    });

    document.getElementById("queueList").innerHTML =
    list.map(v=>`
        <div class="queue-item" onclick="playFromQueue('${v.id}')">
            ▶ ${v.title}
        </div>
    `).join('');
}

/* GRID FIX */
function renderGrid(){

    document.getElementById("grid").innerHTML =
    videos.map(v=>{
        const id = getId(v.youtube);

        return `
        <div class="card" onclick="playFromGrid('${v.id}')">
            <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
            <p>${v.title}</p>
        </div>`;
    }).join('');
}

/* CLICK HANDLERS */
window.playFromGrid = (id)=>{
    const v = videos.find(x=>x.id===id);
    if(v) playVideo(v);
};

window.playFromQueue = (id)=>{
    const v = videos.find(x=>x.id===id);
    if(v) playVideo(v);
};

/* YOUTUBE ID FIX */
function getId(url){
    if(!url) return "";
    let m = url.match(/(youtu\.be\/|v=|\/embed\/)([a-zA-Z0-9_-]+)/);
    return m ? m[2] : "";
}

</script>

</body>
</html>
