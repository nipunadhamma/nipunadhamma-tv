<style>
    /* මූලික සැකසුම */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    
    .navbar {
        background: linear-gradient(to bottom, #d7a163 70%, rgba(215, 161, 99, 0) 100%);
        height: 70px;
        display: flex;
        align-items: center;
        padding: 0 20px;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
    }

    .logo-section { display: flex; align-items: center; }
    .logo-section img { height: 50px; margin-right: 10px; }
    .logo-section span { font-weight: bold; font-size: 22px; color: #333; }

    .nav-links { display: flex; margin-left: auto; }
    .nav-item { position: relative; padding: 25px 15px; cursor: pointer; color: #333; font-weight: 500; transition: 0.3s; }
    .nav-item:hover { background-color: rgba(255, 255, 255, 0.4); }

    
    /* Dropdown මෙනුව සඳහා විනිවිද පෙනෙන පසුබිම */
    .dropdown { 
        display: none; 
        position: absolute; 
        top: 100%; 
        left: 0; 
        
        /* මෙතැනදී පසුබිම් වර්ණය විනිවිද පෙනෙන ලෙස සකසා ඇත (අවසාන අගය 0.8 මගින් විනිවිදභාවය පාලනය කරයි) */
        background-color: rgba(255, 255, 255, 0.1); 
        
        /* තවත් අලංකාර කිරීමට Blur effect එකක් එකතු කළ හැක */
        backdrop-filter: blur(5px); 
        
        min-width: 150px; 
        box-shadow: 0px 8px 16px rgba(0,0,0,0.2); 
        z-index: 1000; 
        padding-top: 10px;
    }
    .nav-item { 
        position: relative; 
        padding: 25px 15px; 
        cursor: pointer; 
        color: #333; 
        font-weight: 500; 
        transition: 0.3s; 
    }
    .nav-item:hover .dropdown { display: block; }
    .dropdown a { 
        display: block; 
        padding: 12px; 
        text-decoration: none; 
        color: #333; 
    }

    /* මවුස් එක ගෙන ගිය විට වර්ණය වෙනස් වීම */
    .dropdown a:hover { 
        background-color: rgba(255, 255, 255, 0.5); 
    }

    .menu-toggle { display: none; font-size: 25px; cursor: pointer; color: #333; margin-left: auto; }

    @media (max-width: 768px) {
        .menu-toggle { display: block; }
        .nav-links { display: none; flex-direction: column; width: 100%; background: #d7a163; position: absolute; top: 70px; left: 0; padding: 10px; }
        .nav-links.active { display: flex; }
        .nav-item { padding: 15px; width: 100%; }
    }
</style>

<div class="navbar">
    <div class="logo-section">
        <img src="image/logo.png" alt="Logo">
        <span>nipunadhamma.org</span>
    </div>
    <div class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('active')">☰</div>
   <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-item">ආලින්දය</a>

            <div class="dropdown">

            </div>
        </div>
        <div class="nav-item">පොත්ගුල ▼
            <div class="dropdown">
                <a href="dhamma-books.html">දහම් පොත්</a>
                <a href="blog.html">සඟරාව</a>

            </div>
        </div>
        <div class="nav-item">අපි ගැන</div>
    </div>
</div>
