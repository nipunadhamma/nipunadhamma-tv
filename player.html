<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Nipunadhamma</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f0f0f; color: white; }
        
        /* Navbar */
        .navbar { display: flex; align-items: center; padding: 10px 20px; background: #111; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #ff0000; display: flex; align-items: center; gap: 10px; }
        .dropdown { margin-left: auto; position: relative; }
        .dropbtn { background: #333; color: white; padding: 8px 16px; border: none; cursor: pointer; }

        /* Layout */
        .main-container { display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .player-section { width: 100%; max-width: 800px; margin: auto; }
        iframe { width: 100%; height: 450px; border-radius: 12px; }
        
        /* Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 8px; cursor: pointer; }
        .card img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">▶ නිපුණධම්ම</div>
    <div class="dropdown">
        <button class="dropbtn">වෙනත් ▲</button>
    </div>
</div>

<div class="main-container">
    <div class="player-section">
        <iframe id="main-player" src="" allowfullscreen></iframe>
        <h2 id="video-title">Loading...</h2>
        <a href="https://www.youtube.com/@nipunadhamma" style="color:red;">සියලු වීඩියෝ නරඹන්න</a>
    </div>

    <h3>වීඩියෝ ලැයිස්තුව</h3>
    <div class="video-grid" id="grid"></div>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const grid = document.getElementById('grid');
            const player = document.getElementById('main-player');
            const title = document.getElementById('video-title');

            // පළමු වීඩියෝව ප්ලේ කරන්න
            player.src = `https://www.youtube.com/embed/${data[0].id}`;
            title.innerText = data[0].title;

            // ග්‍රිඩ් එක ලෝඩ් කරන්න
            data.forEach(video => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg">
                    <p>${video.title}</p>
                `;
                card.onclick = () => {
                    player.src = `https://www.youtube.com/embed/${video.id}`;
                    title.innerText = video.title;
                    window.scrollTo(0,0);
                };
                grid.appendChild(card);
            });
        });
</script>

</body>
</html>
