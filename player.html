<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nipunadhamma ධර්ම දේශනා එකතුව</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f0f0f; color: white; }
        
        /* Navbar */
        .navbar { display: flex; align-items: center; padding: 15px; background: #111; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: bold; color: #ff0000; margin-right: 20px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; }
        
        /* Mobile Menu */
        .menu-toggle { display: none; cursor: pointer; font-size: 24px; margin-left: auto; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; background: #222; position: absolute; top: 60px; right: 0; width: 200px; padding: 20px; }
            .menu-toggle { display: block; }
            .show { display: flex; }
        }

        .container { padding: 20px; }
        .player-section { width: 100%; max-width: 900px; margin: auto; }
        iframe { width: 100%; height: 500px; border-radius: 10px; border: none; }
        
        .playlist-section { margin-top: 40px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 10px; }
        .card { background: #1a1a1a; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #333; }
        .card img { width: 100%; border-radius: 5px; }
        .card p { font-size: 14px; margin: 8px 0 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">▶ නිපුණධම්ම</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
        <a href="#">හෝම්</a>
        <a href="#">දේශනා</a>
        <a href="#">අප ගැන</a>
    </div>
</div>

<div class="container">
    <div class="player-section">
        <iframe id="main-player" src="" allowfullscreen></iframe>
        <h2 id="video-title">වීඩියෝවක් තෝරන්න</h2>
    </div>

    <div id="content"></div>
</div>

<script>
    const API_KEY = "AIzaSyAb2YXHiSam-qwgZNYumcmutKa3zarkd4E"; 

    function toggleMenu() { document.getElementById("navLinks").classList.toggle("show"); }

    async function loadPlaylists() {
        try {
            const response = await fetch('data.json');
            const playlists = await response.json();

            for (const list of playlists) {
                const section = document.createElement('div');
                section.className = 'playlist-section';
                section.innerHTML = `<h3>${list.category}</h3><div class="video-grid" id="${list.playlistId}"></div>`;
                document.getElementById('content').appendChild(section);

                const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${list.playlistId}&maxResults=10&key=${API_KEY}`);
                const data = await res.json();
                const grid = document.getElementById(list.playlistId);

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${item.snippet.thumbnails.medium.url}"><p>${item.snippet.title}</p>`;
                    card.onclick = () => {
                        // මෙතනදී rel=0 සහ modestbranding=1 එකතු කර ඇත
                        document.getElementById('main-player').src = `https://www.youtube.com/embed/${item.snippet.resourceId.videoId}?modestbranding=1&rel=0`;
                        document.getElementById('video-title').innerText = item.snippet.title;
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    };
                    grid.appendChild(card);
                });
            }
        } catch (error) { console.error("Error loading data:", error); }
    }
    loadPlaylists();
</script>

</body>
</html>
