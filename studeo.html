<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nipunadhamma TV Studio</title>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:#0b0f19;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
width:260px;
background:#111827;
padding:25px 20px;
position:fixed;
left:0;
top:0;
height:100vh;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:26px;
font-weight:bold;
color:#e50914;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
background:#1f2937;
color:white;
border:none;
padding:14px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
font-size:15px;
text-align:left;
}

.menu button:hover{
background:#e50914;
transform:translateX(5px);
}

/* =========================
MAIN
========================= */

.main{
margin-left:260px;
width:100%;
padding:30px;
}

/* =========================
TOPBAR
========================= */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:32px;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
background:#e50914;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

/* =========================
CARD
========================= */

.card{
background:#141a2a;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
margin-bottom:30px;
}

.card h2{
margin-bottom:20px;
font-size:24px;
}

/* =========================
FORM
========================= */

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#cbd5e1;
}

.form-group input,
.form-group textarea,
.form-group select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
outline:none;
font-size:14px;
}

textarea{
resize:none;
height:120px;
}

/* =========================
BUTTON
========================= */

.upload-btn{
background:#e50914;
color:white;
border:none;
padding:14px 25px;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.upload-btn:hover{
background:#ff1e28;
transform:scale(1.03);
}

/* =========================
VIDEO GRID
========================= */

.video-list{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

/* =========================
VIDEO CARD
========================= */

.video-card{
background:#1a2235;
border-radius:16px;
overflow:hidden;
transition:0.3s;
}

.video-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.video-card img{
width:100%;
height:160px;
object-fit:cover;
}

.video-content{
padding:15px;
}

.video-title{
font-size:15px;
font-weight:bold;
margin-bottom:10px;
line-height:1.5;
}

.video-playlist{
font-size:13px;
color:#9ca3af;
margin-bottom:15px;
}

/* =========================
DELETE BUTTON
========================= */

.delete-btn{
background:#dc2626;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:bold;
transition:0.3s;
}

.delete-btn:hover{
background:#ff3030;
}

/* =========================
EMPTY
========================= */

.empty{
text-align:center;
padding:40px;
color:#9ca3af;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.topbar h1{
font-size:24px;
}

.video-list{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- =========================
SIDEBAR
========================= -->

<div class="sidebar">

<div class="logo">
🎬 Nipunadhamma TV
</div>

<div class="menu">

<button>📊 Dashboard</button>

<button>🎥 Upload Video</button>

<button>📚 Playlists</button>

<button>🔥 Trending</button>

<button>⚙ Settings</button>

</div>

</div>

<!-- =========================
MAIN
========================= -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>YouTube Studio</h1>

<div class="profile">
N
</div>

</div>

<!-- =========================
UPLOAD FORM
========================= -->

<div class="card">

<h2>🎥 Upload YouTube Video</h2>

<form id="videoForm">

<div class="form-group">

<label>Video Title</label>

<input
type="text"
id="title"
placeholder="Enter video title"
required
>

</div>

<div class="form-group">

<label>YouTube Link</label>

<input
type="url"
id="youtube"
placeholder="Paste YouTube URL"
required
>

</div>

<div class="form-group">

<label>Description</label>

<textarea
id="description"
placeholder="Enter video description"
></textarea>

</div>

<div class="form-group">

<label>Playlist Category</label>

<select id="playlist">

<option>Dhamma</option>

<option>Sermons</option>

<option>Stories</option>

<option>Meditation</option>

<option>Other Videos</option>

</select>

</div>

<button
class="upload-btn"
type="submit"
>

⬆ Upload Video

</button>

</form>

</div>

<!-- =========================
VIDEO LIST
========================= -->

<div class="card">

<h2>📺 Uploaded Videos</h2>

<div
class="video-list"
id="videoList"
>

<div class="empty">
Loading videos...
</div>

</div>

</div>

</div>

<!-- =========================
FIREBASE
========================= -->

<script type="module">

/* =========================
FIREBASE IMPORT
========================= */

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =========================
FIREBASE CONFIG
========================= */

const firebaseConfig = {

apiKey:
"AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",

authDomain:
"nipunadhamma-video.firebaseapp.com",

databaseURL:
"https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:
"nipunadhamma-video",

storageBucket:
"nipunadhamma-video.firebasestorage.app",

messagingSenderId:
"571055014816",

appId:
"1:571055014816:web:301e15593a7ab7dd591ac5"

};

/* =========================
INIT
========================= */

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =========================
GET YOUTUBE ID
========================= */

function getId(url){

if(!url) return "";

if(url.includes("youtu.be/")){

return url
.split("youtu.be/")[1]
.split("?")[0];

}

if(url.includes("watch?v=")){

return url
.split("watch?v=")[1]
.split("&")[0];

}

return "";

}

/* =========================
UPLOAD VIDEO
========================= */

const form =
document.getElementById("videoForm");

form.addEventListener("submit",(e)=>{

e.preventDefault();

const title =
document.getElementById("title").value;

const youtube =
document.getElementById("youtube").value;

const description =
document.getElementById("description").value;

const playlist =
document.getElementById("playlist").value;

/* SAVE TO FIREBASE */

push(ref(db,"videos"),{

title,
youtube,
description,
playlist,
timestamp:Date.now()

});

/* ALERT */

alert("✅ Video Uploaded Successfully");

/* RESET */

form.reset();

});

/* =========================
LOAD VIDEOS
========================= */

const videoList =
document.getElementById("videoList");

onValue(ref(db,"videos"),(snapshot)=>{

videoList.innerHTML = "";

const arr = [];

snapshot.forEach(child=>{

arr.push({

key:child.key,
...child.val()

});

});

/* REVERSE */

arr.reverse();

/* EMPTY */

if(arr.length === 0){

videoList.innerHTML = `
<div class="empty">
No videos uploaded yet.
</div>
`;

return;

}

/* RENDER */

arr.forEach(v=>{

const id = getId(v.youtube);

videoList.innerHTML += `

<div class="video-card">

<img
src="https://img.youtube.com/vi/${id}/hqdefault.jpg"
>

<div class="video-content">

<div class="video-title">
${v.title}
</div>

<div class="video-playlist">
📚 ${v.playlist}
</div>

<button
class="delete-btn"
onclick="deleteVideo('${v.key}')"
>

🗑 Delete Video

</button>

</div>

</div>

`;

});

});

/* =========================
DELETE VIDEO
========================= */

window.deleteVideo = function(key){

const ok =
confirm("Delete this video?");

if(ok){

remove(ref(db,"videos/"+key));

}

}

</script>

</body>
</html>
