<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>Admin Panel</h2>

<input id="title" placeholder="Title"><br>
<input id="youtube" placeholder="YouTube link"><br>
<textarea id="desc" placeholder="Desc"></textarea><br>

<button onclick="upload()">Upload</button>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyALHXrfoLleQtbOq6VcCeVzs1cEnmN2TD4",
  authDomain: "nipunadhamma-video.firebaseapp.com",
  databaseURL: "https://nipunadhamma-video-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nipunadhamma-video",
  storageBucket: "nipunadhamma-video.firebasestorage.app",
  messagingSenderId: "571055014816",
  appId: "1:571055014816:web:301e15593a7ab7dd591ac5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const ADMINS=["kalawanesangamaji@gmail.com"];

window.login=function(){
signInWithPopup(auth,new GoogleAuthProvider());
}

window.logout=function(){
signOut(auth);
}

onAuthStateChanged(auth,(user)=>{

if(!user){
window.login();
return;
}

if(!ADMINS.includes(user.email)){
alert("Not allowed");
signOut(auth);
return;
}

load();

});

window.upload=function(){

push(ref(db,"videos"),{
title:title.value,
youtube:youtube.value,
desc:desc.value,
time:Date.now()
});

alert("Uploaded");

}

function load(){

onValue(ref(db,"videos"),(snap)=>{

let html="";

snap.forEach(v=>{
html+=`
<div>
${v.val().title}
<button onclick="del('${v.key}')">Delete</button>
</div>
`;
});

document.getElementById("list").innerHTML=html;

});

}

window.del=function(id){
remove(ref(db,"videos/"+id));
}

</script>

</body>
</html>
