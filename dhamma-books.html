<!DOCTYPE html>
<html lang="si">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books Debug</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
}

.cover{
    width:100%;
    height:160px;
    object-fit:cover;
}

.title{ color:gold; }

.small{ color:#bbb; font-size:12px; }

a{
    display:block;
    margin-top:8px;
    color:#00ffcc;
}

#viewer{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:none;
}

#pdfFrame{
    width:100%;
    height:100%;
    border:none;
}

#close{
    position:absolute;
    top:10px;
    right:20px;
    cursor:pointer;
}

</style>

</head>

<body>

<h2 style="padding:10px;">📚 Debug Book System</h2>

<div class="grid" id="grid"></div>

<!-- VIEWER -->
<div id="viewer">
    <div id="close" onclick="closeViewer()">✖ Close</div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzClYZ5JVzY0nKKYrPKBWCCIZMsksAKnJA7pRp7sK7qoW93D7vDqs-pIPfs8g-hBAUIJw/exec";

console.log("📡 API Loading...");

fetch(API)
.then(res => res.json())
.then(data => {

    console.log("📚 DATA RECEIVED:", data);

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(book => {

        console.log("📖 BOOK:", book);

        grid.innerHTML += `
        <div class="card">

            <img src="${book.cover}" class="cover">

            <div class="title">${book.title}</div>

            <div class="small">${book.author}</div>

            <div class="small">${book.category}</div>

            <a href="${book.link}" target="_blank">📥 Download</a>

            <a href="javascript:void(0)" onclick="openBook('${book.view}')">📖 View</a>

        </div>
        `;

    });

})
.catch(err => {
    console.error("❌ API ERROR:", err);
});

function openBook(url){
    console.log("📖 Opening:", url);
    document.getElementById("viewer").style.display = "block";
    document.getElementById("pdfFrame").src = url;
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

</script>

</body>
</html>
