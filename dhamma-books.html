
<!DOCTYPE html>
<html lang="si">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>නිපුණධම්ම දහම් පොත්</title>

<link rel="stylesheet" href="style.css">

<base href="/nipunadhamma-tv/">

<style>

/* BODY */
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
    margin-top:80px;
}

/* CARD */
.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
    overflow:hidden;
}

/* TITLE FIX (NO OVERFLOW) */
.title{
    color:gold;
    font-size:16px;
    margin-bottom:5px;

    word-wrap:break-word;
    overflow-wrap:break-word;
    white-space:normal;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* SMALL TEXT */
.small{
    color:#bbb;
    font-size:12px;
}

/* LINK */
.card a{
    display:inline-block;
    margin-top:10px;
    color:#00ffcc;
    text-decoration:none;
}

.card a:hover{
    color:#00ffaa;
}

/* ERROR MESSAGE */
#error{
    padding:20px;
    color:red;
}
    #viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:9999;
}

#pdfFrame{
    width:100%;
    height:100%;
    border:none;
}

#close{
    position:absolute;
    top:10px;
    right:20px;
    color:white;
    font-size:20px;
    cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR LOAD HERE -->
<div id="navbar"></div>

<!-- BOOK GRID -->
<div class="grid" id="grid"></div>
    <div id="viewer" style="display:none;">
    <div id="close" onclick="closeViewer()">✖ Close</div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>

// ✅ YOUR GOOGLE APPS SCRIPT API
const API = "https://script.google.com/macros/s/AKfycbxQEPo4ORZdSVxHFFSsO926gpbOEvMpnWUW_FjQiPKLc9Nf-BrCyQzdOyLuRubF43nG1w/exec";

fetch(API)
.then(res => res.json())
.then(data => {

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

   data.forEach(book => {

    grid.innerHTML += `
    <div class="card">

        <img src="${book.cover}" class="cover">

        <div class="title">${book.title}</div>

        <div class="small">✍ ${book.author}</div>

        <div class="small">📂 ${book.category}</div>

        <a href="${book.link}" target="_blank">📥 Download</a>

    </div>
    `;

});
})
.catch(err => {

    document.getElementById("grid").innerHTML =
    "<div id='error'>Error loading books</div>";

});
    

</script>

<!-- NAVBAR SCRIPT -->
<script src="/nipunadhamma-tv/script.js"></script>

</body>
</html>
