<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>නිපුණධම්ම - පුස්කොළ පොත්ගුල</title>
<style>
    :root {
        --parchment: #e3c79a;
        --dark-text: #2c1e0f;
        --gold: #c5b358;
    }
    body { 
        margin: 0; padding-top: 80px; 
        background: #2c2416;
        color: var(--dark-text); font-family: 'Serif', Georgia, serif;
    }

    /* Navbar Styles */
    .navbar {
        background: var(--parchment); 
        border-bottom: 2px solid #c5b358;
        height: 70px; 
        display: flex; 
        align-items: center; 
        padding: 0 20px;
        position: fixed; top: 0; width: 100%; z-index: 1000;
        justify-content: space-between; /* අංග දෙපසට බෙදා හැරීමට */
    }
    
    .nav-left { display: flex; align-items: center; }
    
    .logo-section span { font-weight: bold; font-size: 22px; color: #3b2a1a; margin-left: 10px; }
    
    .nav-links { display: flex; margin-left: auto; padding-right: 40px; flex-wrap: wrap; }
    .nav-item { position: relative; padding: 25px 15px; cursor: pointer; color: #333; font-weight: 500; transition: 0.3s; }
    
    .dropdown { 
        display: none; position: absolute; top: 100%; left: 0; 
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
        border-radius: 0 0 10px 10px; min-width: 180px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        z-index: 2000;
    }
    .nav-item:hover .dropdown { display: block; }
    .dropdown a { display: block; padding: 12px; text-decoration: none; color: #3b2a1a; }
    
    .menu-toggle { font-size: 28px; cursor: pointer; display: none; margin-right: 15px; }

    /* Page Content */
    .page-container { max-width: 900px; margin: 20px auto; background: #f4e4bc; padding: 40px; border-radius: 5px; border: 5px double #8b4513; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: #e6d2a0; padding: 15px; border-radius: 8px; border: 1px solid #d4c598; transition: transform 0.2s; }
    .card:hover { transform: scale(1.02); }
    .cover { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
    .title { color: #5c4a2a; font-weight: bold; font-size: 18px; margin-bottom: 5px; word-wrap: break-word; }
    .author { font-size: 14px; color: #7a633a; margin-bottom: 10px; }
    .btn-group { display: flex; gap: 10px; }
    .btn { padding: 8px 12px; text-decoration: none; font-size: 12px; font-weight: bold; border-radius: 4px; border: 1px solid #8b4513; }
    .btn-view { background: #8b4513; color: white; }
    .btn-down { background: #d4c598; color: #2c1e0f; }

    #authorButtons { margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; }
    #authorButtons button { margin: 5px; background: #8b4513; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; }

    #viewer { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; flex-direction:column; z-index:9999; }
    
    /* Responsive */
    @media (max-width: 900px) {
        .menu-toggle { display: block; }
        .nav-links { 
            display: none; flex-direction: column; width: 100%; height: 100vh;
            background: #2b2520; position: absolute; top: 70px; left: 0; padding-top: 20px;
        }
        .nav-links.active { display: flex; z-index: 9999; }
        .nav-item { color: white; border-bottom: 1px solid #444; }
        .dropdown { position: relative; background: #3b332a; }
        .dropdown a { color: white; }
    }
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-left">
        <div class="menu-toggle" id="menuToggle">☰</div>
        <div class="logo-section"><span>nipunadhamma.org</span></div>
    </div>
    
    <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-item">ආලින්දය</a>
        <div class="nav-item">ධම්ම වාහිණී ▼
            <div class="dropdown">
                <a href="video.html">ධර්ම සාකච්ඡා</a>
                <a href="player.html">ධර්ම දේශනා</a>
            </div>
        </div>
        <div class="nav-item">පොත්ගුල ▼
            <div class="dropdown">
                <a href="dhamma-book.html">දහම් පොත්</a>
                <a href="blog.html">සඟරාව</a>
            </div>
        </div>
    </div>
</div>

<div class="page-container">
    <h2 style="text-align:center;">📜 නිපුණධම්ම පොත් මැදුර</h2>
    <input type="text" id="searchBox" placeholder="පොත් නම හෝ කතුවරයා සොයන්න..." onkeyup="filterBooks()" style="width:100%; padding:10px; border:1px solid #8b4513; border-radius:5px;">
    
    <div id="authorButtons"></div>
    <div class="grid" id="grid"></div>
</div>

<div id="viewer">
    <div style="padding:15px; background:#e3c79a; display:flex; justify-content:space-between;">
        <span onclick="closeViewer()" style="cursor:pointer; font-weight:bold;">✖ වසා දමන්න</span>
    </div>
    <iframe id="pdfFrame" style="flex:1; width:100%; border:none;"></iframe>
</div>

<script>
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');

    menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
    });

    const API = "https://script.google.com/macros/s/AKfycbxDDoeicOBIO1wG_StcDBq2I_DOB8In3nbnbMAZRQR3YDCe0pktYAas9ezxtpyAYhBEwg/exec";
    let allBooks = [];

    fetch(API).then(res => res.json()).then(data => {
        allBooks = data;
        renderBooks(allBooks);
        loadAuthors();
    });

    function renderBooks(data){
        let grid = document.getElementById("grid");
        grid.innerHTML = data.map(book => `
            <div class="card">
                <img src="${book.cover}" class="cover">
                <div class="title">${book.title}</div>
                <div class="author">✍ ${book.author}</div>
                <div class="btn-group">
                    <a href="javascript:void(0)" class="btn btn-view" onclick="openBook('${book.link}')">📖 බැලීමට</a>
                    <a href="${book.link}" target="_blank" class="btn btn-down">📥 බාගත</a>
                </div>
            </div>
        `).join('');
    }

    function loadAuthors(){
        let authors = [...new Set(allBooks.map(b => b.author))];
        let container = document.getElementById("authorButtons");
        container.innerHTML = '<button onclick="renderBooks(allBooks)">සියලුම කතුවරු</button>';
        authors.forEach(a => {
            container.innerHTML += `<button onclick="filterAuthor('${a}')">${a}</button>`;
        });
    }

    function filterAuthor(name){
        renderBooks(allBooks.filter(b => b.author === name));
    }

    function filterBooks(){
        let val = document.getElementById("searchBox").value.toLowerCase();
        renderBooks(allBooks.filter(b => b.title.toLowerCase().includes(val) || b.author.toLowerCase().includes(val)));
    }

    function openBook(url){
        document.getElementById("viewer").style.display = "flex";
        document.getElementById("pdfFrame").src = "https://docs.google.com/viewer?url=" + encodeURIComponent(url) + "&embedded=true";
    }

    function closeViewer(){ 
        document.getElementById("viewer").style.display = "none";
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
