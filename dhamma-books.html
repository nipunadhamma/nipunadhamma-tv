<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>නිපුණධම්ම දහම් පොත්</title>

<style>
/* NAVBAR STYLES */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background-color: #333;
    color: white;
}
.nav-left, .nav-right { display: flex; align-items: center; }
.logo { width: 40px; height: 40px; margin-right: 10px; }
.site-name { font-size: 20px; font-weight: bold; }
.dropdown { position: relative; display: inline-block; }
.dropbtn { background: none; border: none; color: white; cursor: pointer; padding: 10px; font-size: 16px; }
.dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1000; }
.dropdown-content a { color: black; padding: 12px 16px; display: block; text-decoration: none; }
.dropdown:hover .dropdown-content { display: block; }

/* BODY & OTHER STYLES */
body{ margin:0; background:#111; color:white; font-family:sans-serif; }
.page-header{ padding:30px 20px; text-align:center; }
.page-header h2{ color:gold; margin:0 0 10px 0; }
.page-header input{ width:60%; padding:10px; border-radius:20px; border:none; outline:none; }
#filters{ text-align:center; margin-bottom:10px; }
#filters button{ margin:5px; padding:6px 12px; border:none; border-radius:15px; cursor:pointer; background:#222; color:white; }
#filters button:hover{ background:gold; color:black; }
#authorButtons{ margin-top:15px; }
#authorButtons button{ margin:5px; padding:6px 12px; border:none; border-radius:15px; cursor:pointer; background:#444; color:white; }
#authorButtons button:hover{ background:gold; color:black; }
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; padding:20px; }
.card{ background:#1e1e1e; padding:15px; border-radius:12px; }
.cover{ width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:10px; }
.title{ color:gold; font-size:16px; margin-bottom:5px; }
.small{ color:#bbb; font-size:12px; }
.card a{ display:inline-block; margin-top:10px; margin-right:10px; color:#00ffcc; text-decoration:none; }
#viewer{ position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; display:none; flex-direction:column; }
#topbar{ display:flex; justify-content:space-between; padding:10px 15px; background:#111; }
#pdfFrame{ flex:1; width:100%; border:none; }
.fullscreen{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999; }
#error{ padding:20px; color:red; }

/* Responsive Media Query */
@media (max-width: 600px) {
    .navbar { padding: 5px 10px; }
    .site-name { font-size: 16px; }
    .logo { width: 30px; height: 30px; }
    .dropbtn { font-size: 14px; padding: 5px; }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="nav-left">
        <img src="logo.png" alt="Logo" class="logo">
        <span class="site-name">නිපුණධම්ම</span>
    </div>
    <div class="nav-right">
        <a href="index.html" style="color:white; text-decoration:none; margin-right:15px;">Home</a>
        <div class="dropdown">
            <button class="dropbtn">පොත් වර්ග ▼</button>
            <div class="dropdown-content">
                <a href="#">පොත් 01</a>
                <a href="#">පොත් 02</a>
            </div>
        </div>
    </div>
</nav>

<div class="page-header">
    <h2>📚 Dhamma Books Library</h2>
    <input type="text" id="searchBox" placeholder="🔎 Search books..." onkeyup="filterBooks()">
</div>

<div id="filters">
    <button onclick="filterCategory('All')">All</button>
    <button onclick="filterCategory('Dhamma')">Dhamma</button>
    <button onclick="filterCategory('Pirith')">Pirith</button>
    <button onclick="filterCategory('Meditation')">Meditation</button>
    <div id="authorButtons"></div>
</div>

<div class="grid" id="grid"></div>

<div id="viewer">
    <div id="topbar">
        <span onclick="closeViewer()" style="cursor:pointer;">✖ Close</span>
        <span onclick="toggleFullscreen()" style="cursor:pointer;">⛶ Fullscreen</span>
    </div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxDDoeicOBIO1wG_StcDBq2I_DOB8In3nbnbMAZRQR3YDCe0pktYAas9ezxtpyAYhBEwg/exec";
let allBooks = [];

fetch(API)
.then(res => res.json())
.then(data => {
    allBooks = data;
    renderBooks(allBooks);
    loadAuthors();
})
.catch(err => {
    document.getElementById("grid").innerHTML = "<div id='error'>Error loading books</div>";
});

function renderBooks(data){
    let grid = document.getElementById("grid");
    grid.innerHTML = "";
    data.forEach(book => {
        grid.innerHTML += `
        <div class="card">
            <img src="${book.cover}" class="cover">
            <div class="title">${book.title}</div>
            <div class="small">✍ ${book.author}</div>
            <div class="small">📂 ${book.category}</div>
            <a href="${book.link}" target="_blank">📥 Download</a>
            <a href="javascript:void(0)" onclick="openBook('${book.link}')">📖 View</a>
        </div>`;
    });
}

function filterBooks(){
    let value = document.getElementById("searchBox").value.toLowerCase();
    let filtered = allBooks.filter(book => book.title.toLowerCase().includes(value) || book.author.toLowerCase().includes(value));
    renderBooks(filtered);
}

function filterCategory(cat){
    if(cat === "All"){ renderBooks(allBooks); return; }
    let filtered = allBooks.filter(book => book.category.toLowerCase() === cat.toLowerCase());
    renderBooks(filtered);
}

function loadAuthors(){
    let container = document.getElementById("authorButtons");
    container.innerHTML = `<button onclick="filterAuthor('All')">All Authors</button>`;
    let authors = [...new Set(allBooks.map(book => book.author))];
    authors.sort();
    authors.forEach(author => {
        container.innerHTML += `<button onclick="filterAuthor('${author}')">${author}</button>`;
    });
}

function filterAuthor(author){
    if(author === "All"){ renderBooks(allBooks); return; }
    let filtered = allBooks.filter(book => book.author === author);
    renderBooks(filtered);
}

function openBook(url){
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("pdfFrame").src = url;
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

function toggleFullscreen(){
    document.getElementById("viewer").classList.toggle("fullscreen");
}

document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){ closeViewer(); }
});
</script>

</body>
</html>
