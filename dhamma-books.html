<!DOCTYPE html>
<html lang="si">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>නිපුණධම්ම දහම් පොත්</title>

<link rel="stylesheet" href="style.css">

<base href="/nipunadhamma-tv/">

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
    margin-top:80px;
}

/* CARD */
.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
}

/* COVER */
.cover{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

/* TITLE */
.title{
    color:gold;
    font-size:16px;
    margin-bottom:5px;

    word-wrap:break-word;
    overflow-wrap:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* SMALL */
.small{
    color:#bbb;
    font-size:12px;
}

/* LINKS */
.card a{
    display:inline-block;
    margin-top:10px;
    margin-right:10px;
    color:#00ffcc;
    text-decoration:none;
}

.card a:hover{
    color:#00ffaa;
}

/* VIEWER */
#viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:9999;
}

#pdfFrame{
    width:100%;
    height:100%;
    border:none;
}

#close{
    position:absolute;
    top:10px;
    right:20px;
    color:white;
    font-size:20px;
    cursor:pointer;
    z-index:10000;
}

#error{
    padding:20px;
    color:red;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- BOOK GRID -->
<div class="grid" id="grid"></div>

<!-- PDF VIEWER -->
<div id="viewer" style="display:none;">
    <div id="close" onclick="closeViewer()">✖ Close</div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>

// 🚀 YOUR NEW API
const API = "https://script.google.com/macros/s/AKfycbzClYZ5JVzY0nKKYrPKBWCCIZMsksAKnJA7pRp7sK7qoW93D7vDqs-pIPfs8g-hBAUIJw/exec";

fetch(API)
.then(res => res.json())
.then(data => {

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(book => {

        grid.innerHTML += `
        <div class="card">

            <img src="${book.cover}" class="cover">

            <div class="title">${book.title}</div>

            <div class="small">✍ ${book.author}</div>

            <div class="small">📂 ${book.category}</div>

             <a href="javascript:void(0)" onclick="openBook('${book.view}')">📖 View</a>
             
            <a href="${book.link}" target="_blank">📥 Download</a>
            
        
           
             

        </div>
        `;

    });

})
.catch(err => {
    document.getElementById("grid").innerHTML =
    "<div id='error'>Error loading books</div>";
});


// 📖 VIEWER FUNCTIONS
function openBook(url){
    document.getElementById("viewer").style.display = "block";
    document.getElementById("pdfFrame").src = url;
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

</script>

<!-- NAVBAR SCRIPT -->
<script src="/nipunadhamma-tv/script.js"></script>

</body>
</html>
