<!DOCTYPE html>
<html lang="si">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>නිපුණධම්ම දහම් පොත්</title>

<link rel="stylesheet" href="style.css">

<style>

/* ============================= */
/* BODY */
/* ============================= */

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

/* ============================= */
/* PAGE HEADER */
/* ============================= */

.page-header{
    padding:40px 20px 20px;
    text-align:center;
}

.page-header h2{
    color:#f5d7a1;
    margin-bottom:15px;
    font-size:32px;
}

/* ============================= */
/* SEARCH BOX */
/* ============================= */

.page-header input{
    width:60%;
    max-width:500px;

    padding:12px 18px;

    border:none;
    outline:none;

    border-radius:30px;

    background:#222;
    color:white;

    font-size:16px;
}

/* ============================= */
/* FILTERS */
/* ============================= */

#filters{
    text-align:center;
    margin:15px 0;
}

#filters button,
#authorButtons button{

    margin:6px;

    padding:8px 15px;

    border:none;

    border-radius:20px;

    cursor:pointer;

    background:#2b2b2b;

    color:white;

    transition:0.3s;
}

#filters button:hover,
#authorButtons button:hover{

    background:#f5d7a1;
    color:#111;

    transform:scale(1.05);
}

/* ============================= */
/* AUTHOR BUTTONS */
/* ============================= */

#authorButtons{
    margin-top:15px;
}

/* ============================= */
/* GRID */
/* ============================= */

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(230px,1fr));

    gap:20px;

    padding:25px;
}

/* ============================= */
/* CARD */
/* ============================= */

.card{

    background:#1c1c1c;

    border-radius:15px;

    overflow:hidden;

    transition:0.3s;

    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card:hover{

    transform:translateY(-8px) scale(1.02);

    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* ============================= */
/* COVER */
/* ============================= */

.cover{

    width:100%;
    height:280px;

    object-fit:cover;
}

/* ============================= */
/* CARD CONTENT */
/* ============================= */

.card-content{
    padding:15px;
}

.title{
    color:#f5d7a1;
    font-size:18px;
    margin-bottom:8px;
}

.small{
    color:#bbb;
    font-size:13px;
    margin-bottom:4px;
}

/* ============================= */
/* LINKS */
/* ============================= */

.card a{

    display:inline-block;

    margin-top:12px;
    margin-right:10px;

    color:#00ffd5;

    text-decoration:none;

    font-size:14px;

    transition:0.3s;
}

.card a:hover{
    color:#f5d7a1;
}

/* ============================= */
/* PDF VIEWER */
/* ============================= */

#viewer{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:black;

    z-index:99999;

    display:none;

    flex-direction:column;
}

/* TOP BAR */

#topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:15px;

    background:#111;

    color:white;

    font-size:18px;
}

#topbar span{
    cursor:pointer;
}

/* PDF */

#pdfFrame{

    flex:1;

    width:100%;

    border:none;
}

/* FULLSCREEN */

.fullscreen{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;
}

/* ERROR */

#error{
    padding:30px;
    color:red;
    text-align:center;
}

/* ============================= */
/* MOBILE */
/* ============================= */

@media(max-width:768px){

    .page-header input{
        width:90%;
    }

    .page-header h2{
        font-size:26px;
    }

}

</style>

</head>

<body>

<!-- ============================= -->
<!-- NAVBAR -->
<!-- ============================= -->

<div id="navbar"></div>

<!-- ============================= -->
<!-- PAGE HEADER -->
<!-- ============================= -->

<div class="page-header">

    <h2>📚 Dhamma Books Library</h2>

    <input type="text"
           id="searchBox"
           placeholder="🔎 Search books..."
           onkeyup="filterBooks()">

</div>

<!-- ============================= -->
<!-- FILTERS -->
<!-- ============================= -->

<div id="filters">

    <button onclick="filterCategory('All')">
        All
    </button>

    <button onclick="filterCategory('Dhamma')">
        Dhamma
    </button>

    <button onclick="filterCategory('Pirith')">
        Pirith
    </button>

    <button onclick="filterCategory('Meditation')">
        Meditation
    </button>

    <!-- AUTHOR BUTTONS -->
    <div id="authorButtons"></div>

</div>

<!-- ============================= -->
<!-- BOOK GRID -->
<!-- ============================= -->

<div class="grid" id="grid"></div>

<!-- ============================= -->
<!-- PDF VIEWER -->
<!-- ============================= -->

<div id="viewer">

    <div id="topbar">

        <span onclick="closeViewer()">
            ✖ Close
        </span>

        <span onclick="toggleFullscreen()">
            ⛶ Fullscreen
        </span>

    </div>

    <iframe id="pdfFrame"></iframe>

</div>

<!-- ============================= -->
<!-- BOOK SCRIPT -->
<!-- ============================= -->

<script>

const API =
"https://script.google.com/macros/s/AKfycbxDDoeicOBIO1wG_StcDBq2I_DOB8In3nbnbMAZRQR3YDCe0pktYAas9ezxtpyAYhBEwg/exec";

let allBooks = [];

/* LOAD DATA */

fetch(API)

.then(res => res.json())

.then(data => {

    allBooks = data;

    renderBooks(allBooks);

    loadAuthors();

})

.catch(err => {

    document.getElementById("grid").innerHTML =

    "<div id='error'>Error loading books</div>";

});


/* RENDER BOOKS */

function renderBooks(data){

    let grid = document.getElementById("grid");

    grid.innerHTML = "";

    data.forEach(book => {

        grid.innerHTML += `

        <div class="card">

            <img src="${book.cover}"
                 class="cover"
                 alt="${book.title}">

            <div class="card-content">

                <div class="title">
                    ${book.title}
                </div>

                <div class="small">
                    ✍ ${book.author}
                </div>

                <div class="small">
                    📂 ${book.category}
                </div>

                <a href="${book.link}"
                   target="_blank">
                   📥 Download
                </a>

                <a href="javascript:void(0)"
                   onclick="openBook('${book.link}')">
                   📖 View
                </a>

            </div>

        </div>

        `;
    });
}


/* SEARCH */

function filterBooks(){

    let value =
    document.getElementById("searchBox")
    .value
    .toLowerCase();

    let filtered = allBooks.filter(book =>

        book.title.toLowerCase().includes(value)

        ||

        book.author.toLowerCase().includes(value)
    );

    renderBooks(filtered);
}


/* CATEGORY FILTER */

function filterCategory(cat){

    if(cat === "All"){

        renderBooks(allBooks);

        return;
    }

    let filtered = allBooks.filter(book =>

        book.category.toLowerCase() ===
        cat.toLowerCase()
    );

    renderBooks(filtered);
}


/* LOAD AUTHORS */

function loadAuthors(){

    let container =
    document.getElementById("authorButtons");

    container.innerHTML = "";

    container.innerHTML += `

    <button onclick="filterAuthor('All')">

        All Authors

    </button>

    `;

    let authors = [

        ...new Set(
            allBooks.map(book => book.author)
        )

    ];

    authors.sort();

    authors.forEach(author => {

        container.innerHTML += `

        <button onclick="filterAuthor('${author}')">

            ${author}

        </button>

        `;
    });
}


/* FILTER AUTHOR */

function filterAuthor(author){

    if(author === "All"){

        renderBooks(allBooks);

        return;
    }

    let filtered = allBooks.filter(book =>

        book.author === author
    );

    renderBooks(filtered);
}


/* OPEN BOOK */

function openBook(url){

    document.getElementById("viewer")
    .style.display = "flex";

    document.getElementById("pdfFrame")
    .src = url;
}


/* CLOSE VIEWER */

function closeViewer(){

    document.getElementById("viewer")
    .style.display = "none";

    document.getElementById("pdfFrame")
    .src = "";
}


/* FULLSCREEN */

function toggleFullscreen(){

    document.getElementById("viewer")
    .classList.toggle("fullscreen");
}


/* ESC CLOSE */

document.addEventListener("keydown", function(e){

    if(e.key === "Escape"){

        closeViewer();
    }

});

</script>

<!-- ============================= -->
<!-- NAVBAR SCRIPT -->
<!-- ============================= -->

<script>

fetch("./navbar.html")

.then(response => response.text())

.then(data => {

    document.getElementById("navbar")
    .innerHTML = data;

});

</script>

</body>

</html>
