<!DOCTYPE html>
<html lang="si">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>නිපුණධම්ම දහම් පොත්</title>

<link rel="stylesheet" href="style.css">

<base href="/nipunadhamma-tv/">

<style>

/* BODY */
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
    margin-top:80px;
}

/* CARD */
.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
}

/* COVER */
.cover{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

/* TITLE */
.title{
    color:gold;
    font-size:16px;
    margin-bottom:5px;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* SMALL */
.small{
    color:#bbb;
    font-size:12px;
}

/* LINKS */
.card a{
    display:inline-block;
    margin-top:10px;
    margin-right:10px;
    color:#00ffcc;
    text-decoration:none;
}

/* VIEWER FULL SCREEN */
#viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:9999;
    display:flex;
    flex-direction:column;
}

/* TOP BAR */
#topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    background:#111;
    color:white;
}

#topbar span{
    cursor:pointer;
}

/* PDF */
#pdfFrame{
    flex:1;
    width:100%;
    border:none;
}

/* FULLSCREEN MODE */
.fullscreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:99999;
}

#error{
    padding:20px;
    color:red;
}
    .top-controls{
    padding:15px;
    text-align:center;
}

#searchBox{
    width:60%;
    padding:10px;
    border-radius:20px;
    border:none;
    outline:none;
    font-size:14px;
}

#filters{
    margin-top:10px;
}

#filters button{
    margin:5px;
    padding:6px 12px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:#222;
    color:white;
}

#filters button:hover{
    background:gold;
    color:black;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

    <!-- SEARCH BAR -->
<div class="top-controls">

    <input type="text" id="searchBox" placeholder="🔎 Search books..." onkeyup="filterBooks()">

    <div id="filters">
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Dhamma')">Dhamma</button>
        <button onclick="filterCategory('Pirith')">Pirith</button>
        <button onclick="filterCategory('Meditation')">Meditation</button>
    </div>

</div>

<!-- BOOK GRID -->
<div class="grid" id="grid"></div>

<!-- VIEWER -->
<div id="viewer" style="display:none;">

    <div id="topbar">
        <span onclick="closeViewer()">✖ Close</span>
        <span onclick="toggleFullscreen()">⛶ Fullscreen</span>
    </div>

    <iframe id="pdfFrame"></iframe>

</div>

<script>

// 🚀 API
const API = "https://script.google.com/macros/s/AKfycbxDDoeicOBIO1wG_StcDBq2I_DOB8In3nbnbMAZRQR3YDCe0pktYAas9ezxtpyAYhBEwg/exec";

fetch(API)
.then(res => res.json())
.then(data => {

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(book => {

        grid.innerHTML += `
        <div class="card">

            <img src="${book.cover}" class="cover">

            <div class="title">${book.title}</div>

            <div class="small">✍ ${book.author}</div>

            <div class="small">📂 ${book.category}</div>

            <a href="${book.link}" target="_blank">📥 Download</a>

            <a href="javascript:void(0)" onclick="openBook('${book.view}')">📖 View</a>

        </div>
        `;
    });

})
.catch(err => {
    document.getElementById("grid").innerHTML =
    "<div id='error'>Error loading books</div>";
});


// 📖 OPEN BOOK
function openBook(url){
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("pdfFrame").src = url;
}

// ❌ CLOSE
function closeViewer(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

// ⛶ FULLSCREEN TOGGLE
function toggleFullscreen(){
    document.getElementById("viewer").classList.toggle("fullscreen");
}

// ESC KEY CLOSE
document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeViewer();
    }
    let allBooks = [];

// SAVE DATA
fetch(API)
.then(res => res.json())
.then(data => {

    allBooks = data;

    renderBooks(data);

});

function renderBooks(data){

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(book => {

        grid.innerHTML += `
        <div class="card">

            <img src="${book.cover}" class="cover">

            <div class="title">${book.title}</div>

            <div class="small">${book.author}</div>

            <div class="small">${book.category}</div>

            <a href="${book.link}" target="_blank">📥 Download</a>

            <a href="javascript:void(0)" onclick="openBook('${book.view}')">📖 View</a>

        </div>
        `;
    });
}

// 🔎 SEARCH
function filterBooks(){

    let value = document.getElementById("searchBox").value.toLowerCase();

    let filtered = allBooks.filter(book =>
        book.title.toLowerCase().includes(value) ||
        book.author.toLowerCase().includes(value)
    );

    renderBooks(filtered);
}

// 📂 CATEGORY FILTER
function filterCategory(cat){

    if(cat === "All"){
        renderBooks(allBooks);
        return;
    }

    let filtered = allBooks.filter(book =>
        book.category.toLowerCase() === cat.toLowerCase()
    );

    renderBooks(filtered);
}
});

</script>

<!-- NAVBAR SCRIPT -->
<script src="/nipunadhamma-tv/script.js"></script>

</body>
</html>
