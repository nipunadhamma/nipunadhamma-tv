<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<title>Dhamma Books</title>

<style>
body{
    background:#111;
    color:white;
    font-family:sans-serif;
}

header{
    background:black;
    padding:20px;
    text-align:center;
    color:gold;
    font-size:28px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
}

.title{
    color:gold;
    font-size:18px;
}

.small{
    color:#bbb;
    font-size:13px;
}

a{
    color:#00ffcc;
    text-decoration:none;
}
</style>
</head>

<body>

<header>📚 Dhamma Books Library</header>

<div class="grid" id="grid"></div>

<script>

// 🔥 YOUR APPS SCRIPT LINK (මෙතන දාන්න)
const API = "AKfycbxQEPo4ORZdSVxHFFSsO926gpbOEvMpnWUW_FjQiPKLc9Nf-BrCyQzdOyLuRubF43nG1w";

fetch(API)
.then(res => res.json())
.then(data => {

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(book => {

        grid.innerHTML += `
        <div class="card">
            <div class="title">${book.title}</div>
            <div class="small">✍ ${book.author}</div>
            <div class="small">📂 ${book.category}</div>
            <a href="${book.link}" target="_blank">Download</a>
        </div>
        `;

    });

});

</script>

</body>
</html>
