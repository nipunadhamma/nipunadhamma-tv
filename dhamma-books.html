
<!DOCTYPE html>
<html lang="si">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>නිපුණධම්ම දහම් පොත්</title>

<link rel="stylesheet" href="style.css">

<base href="/nipunadhamma-tv/">

<style>

/* PAGE */

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

/* BOOK CARD */

.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
}

.title{
    color:gold;
    font-size:16px;
    margin-bottom:5px;
}

.small{
    color:#bbb;
    font-size:12px;
}

.card a{
    display:inline-block;
    margin-top:10px;
    color:#00ffcc;
    text-decoration:none;
}

.card a:hover{
    color:#00ffaa;
}

</style>

</head>

<body>

<!-- AUTO NAVBAR -->
<div id="navbar"></div>

<!-- BOOKS GRID -->
<div class="grid" id="grid"></div>

<!-- BOOK API -->
<script>

const API = "https://script.google.com/macros/s/AKfycbxQEPo4ORZdSVxHFFSsO926gpbOEvMpnWUW_FjQiPKLc9Nf-BrCyQzdOyLuRubF43nG1w/exec";

fetch(API)

.then(res => res.json())

.then(data => {

    let grid = document.getElementById("grid");

    grid.innerHTML = "";

    data.forEach(book => {

        grid.innerHTML += `

        <div class="card">

            <div class="title">${book.title}</div>

            <div class="small">✍ ${book.author}</div>

            <div class="small">📂 ${book.category}</div>

            <a href="${book.link}" target="_blank">

            📥 Download

            </a>

        </div>

        `;

    });

})

.catch(err => {

    document.getElementById("grid").innerHTML =

    "<p style='padding:20px;color:red'>Error loading books</p>";

});

</script>

<!-- LOAD NAVBAR -->
<script src="/nipunadhamma-tv/script.js"></script>

</body>
</html>
