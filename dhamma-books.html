<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books System</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; text-align: center; }
        .cover { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }
        .title { color: gold; margin-top: 10px; font-weight: bold; }
        .small { color: #bbb; font-size: 12px; margin-top: 5px; }
        a { display: block; margin-top: 10px; color: #00ffcc; text-decoration: none; padding: 5px; border: 1px solid #00ffcc; border-radius: 5px; }
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: none; flex-direction: column; }
        #topbar { display: flex; justify-content: space-between; padding: 10px 20px; background: #222; }
        #pdfFrame { flex: 1; width: 100%; border: none; }
        .fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 99999; }
    </style>
</head>
<body>

    <h2 style="padding:20px; text-align:center;">📚 මගේ පුස්තකාලය</h2>
    <div class="grid" id="grid">ලෝඩ් වෙමින් පවතී...</div>

    <div id="viewer">
        <div id="topbar">
            <span onclick="closeViewer()" style="cursor:pointer;">✖ Close</span>
            <span onclick="toggleFullscreen()" style="cursor:pointer;">⛶ Fullscreen</span>
        </div>
        <iframe id="pdfFrame"></iframe>
    </div>

    <script>
       const API = "https://script.google.com/macros/s/AKfycbxDDoeicOBIO1wG_StcDBq2I_DOB8In3nbnbMAZRQR3YDCe0pktYAas9ezxtpyAYhBEwg/exec"; // මෙතනට ඔබේ අලුත් URL එක දාන්න

        fetch(API)
        .then(res => res.json())
        .then(data => {
            let grid = document.getElementById("grid");
            grid.innerHTML = "";
            data.forEach(book => {
                grid.innerHTML += `
                <div class="card">
                    <img src="${book.cover}" class="cover">
                    <div class="title">${book.title}</div>
                    <div class="small">කතෘ: ${book.author}</div>
                    <div class="small">වර්ගය: ${book.category}</div>
                    <a href="${book.link}" target="_blank">📥 Download</a>
                    <a href="javascript:void(0)" onclick="openBook('${book.view}')">📖 View</a>
                </div>
                `;
            });
        });

        function openBook(url) {
            document.getElementById("pdfFrame").src = url;
            document.getElementById("viewer").style.display = "flex";
        }

        function closeViewer() {
            document.getElementById("viewer").style.display = "none";
            document.getElementById("pdfFrame").src = "";
        }

        function toggleFullscreen() {
            document.getElementById("viewer").classList.toggle("fullscreen");
        }
    </script>
</body>
</html>
