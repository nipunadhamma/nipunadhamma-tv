    <link rel="stylesheet" href="navbar.css"> 
    <style>
        body {
            background-color: #FAF0E6; /* ඔබේ site එකේ background එකට ගැළපෙන පරිදි */
            font-family: sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .blog-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .blog-header {
            text-align: center;
            color: #3b2a1d;
            margin-bottom: 40px;
        }

        .post-card {
            background: #fff;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            border-left: 5px solid #3b2a1d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .post-card:hover {
            transform: translateX(10px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .post-card a {
            text-decoration: none;
            font-size: 20px;
            color: #3b2a1d;
            font-weight: bold;
        }
    </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
